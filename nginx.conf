# EcoTech Exchange - Enterprise Load Balancer Configuration
# SLIC FAST Component: Load Balancer
# This configuration demonstrates how we divide API requests among multiple Uvicorn instances to prevent server overload.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # 1. Define the pool of available Python backend servers
    # NGINX will automatically use Round-Robin to distribute requests between them.
    upstream ecotech_backend {
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
        server 127.0.0.1:8003;
    }

    server {
        # The single port our users and React app will interact with
        listen 8000;
        server_name localhost;

        location / {
            # 2. Forward all requests to the upstream pool
            proxy_pass http://ecotech_backend;
            
            # Forward the original client headers so FastAPI knows who is requesting
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
